[pytest]
addopts = -v --alluredir=reports/allure-results
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    login_benchmark: 登录十次基准耗时（串行）
    mobile: 移动端自动化测试
    monkey: Android Monkey 稳定性测试
    appium: Appium 随机探索测试
    esbao: 易食包生产环境商城 UI 巡检
    epak: EPAK 英文站生产环境商城 UI 巡检
    api_negative: CRM 接口异常与边界场景
